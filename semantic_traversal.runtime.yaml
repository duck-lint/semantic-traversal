runtime:
  data_root: ".semantic-traversal-data"
  max_retrieval_chunks: 18

graph_traversal:
  enabled: true
  hop_limit: 1
  max_candidates: 24
  seed_sources:
    - graph_seeds
    - active_focus
    - retrieval_terms
  edge_type_allowlist:
    - note_links_note
  node_type_allowlist:
    - note
  match_mode: "exact_or_token_overlap"
  min_token_overlap: 2

llm:
  model: "gpt-5.4-mini"
  max_output_tokens: 6000

semantic_compiler:
  provider: "ollama"
  model: qwen3:8b
  base_url: "http://localhost:11434"
  request_timeout_seconds: 60

embeddings:
  provider: "sentence_transformers"
  model: "sentence-transformers/all-MiniLM-L6-v2"
  base_url: null
  batch_size: 32
  normalize_embeddings: true
  device: null
  request_timeout_seconds: 60

paths:
  corpus_roots:
    - label: "corpus"
      path: "corpus"
    - label: "tests-fixtures"
      path: "tests/fixtures"
  synthetic_nodes_root: "corpus/SYNTHETIC_NODES"

storage:
  threads_root: "threads"
  turns_root: "turns"
  turn_directory_prefix: "turn-"
  conversation_thread_filename: "conversation_thread.json"
  thread_state_filename: "thread_state.json"
  thread_ledger_filename: "thread_ledger.jsonl"
  ingestion_root: "ingestion"
  ingestion_database_filename: "latent_space.sqlite3"
  ingestion_manifests_root: "ingestion/manifests"
  latest_ingest_manifest_filename: "latest.json"

indexes:
  vector_table: "chunk_vectors"
  graph_nodes_table: "graph_nodes"
  graph_edges_table: "graph_edges"

coverage:
  min_selected_chunks: 1
  max_selected_chunks: 18
  require_surface_contributions:
    lexical_index_surface: true
    vector_index_surface: true
    graph_layer: true
    primary_corpus: true
    synthetic_nodes: false
  graph_expansion_hop_limit: 2
  allow_no_retrieval_needed: false
